name: Forca_Bruta_G18
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Pegando arquivos
        uses: actions/checkout@v4

      - name: 2. Preparando Hangar (Java + Tela Virtual)
        run: |
          sudo apt-get update
          # Instalando Java (essencial para Android) e Xvfb (simula um monitor)
          sudo apt-get install -y unzip openjdk-17-jdk xvfb libglu1 libpulse0 libasound2
          echo "Hangar pronto."

      - name: 3. Instalando Motor e RAPT
        run: |
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-sdk.tar.bz2
          tar xf renpy-8.2.1-sdk.tar.bz2
          mv renpy-8.2.1-sdk renpy_sdk
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-rapt.zip
          unzip -q renpy-8.2.1-rapt.zip
          mv rapt renpy_sdk/rapt

      - name: 4. Cuspindo Código (O COMANDO CERTO)
        run: |
          mkdir -p build_output
          chmod +x renpy_sdk/renpy.sh
          # A ORDEM CERTA: Comando 'launcher android_build' seguido do projeto '.'
          # O flag '--install-sdk' garante que o robô baixe as ferramentas do Android sozinho
          xvfb-run ./renpy_sdk/renpy.sh launcher android_build . --install-sdk --destination build_output

      - name: 5. Entrega da Carga
        uses: actions/upload-artifact@v4
        with:
          name: APK_Final_G18
          path: build_output/*.apk
