name: Forca_Bruta_G18_V10
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Pegando arquivos
        uses: actions/checkout@v4

      - name: 2. Instalando o Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Preparando Hangar
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip xvfb libglu1 libpulse0 libasound2
          echo "Hangar pronto."

      - name: 4. Instalando Motor e RAPT
        run: |
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-sdk.tar.bz2
          tar xf renpy-8.2.1-sdk.tar.bz2
          mv renpy-8.2.1-sdk renpy_sdk
          
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-rapt.zip
          unzip -q renpy-8.2.1-rapt.zip
          mv renpy-8.2.1-rapt renpy_sdk/rapt || mv rapt renpy_sdk/rapt

      - name: 5. Criando Identidade e Travando a Memória
        run: |
          cat <<EOF > android.json
          {
              "name": "Games Mais 18",
              "icon_name": "Games Mais 18",
              "package": "com.gam3smais18.mod",
              "version": "1.0",
              "numeric_version": 1,
              "orientation": "sensorLandscape",
              "update_keystore": false,
              "google_play_key": "",
              "google_play_salt": ""
          }
          EOF
          
          # AQUI ESTÁ A TRAVA: Forçando o Android do Ren'Py a usar no máximo 2GB
          mkdir -p renpy_sdk/rapt/project
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > renpy_sdk/rapt/project/gradle.properties

      - name: 6. Cuspindo Código (ESTABILIZADO)
        env:
          # Trava de segurança global do Java para 2GB
          _JAVA_OPTIONS: "-Xmx2g"
        run: |
          mkdir -p build_output
          chmod +x renpy_sdk/renpy.sh
          yes | xvfb-run ./renpy_sdk/renpy.sh renpy_sdk/launcher android_build . --destination $GITHUB_WORKSPACE/build_output

      - name: 7. Entrega da Carga
        uses: actions/upload-artifact@v4
        with:
          name: APK_Final_G18
          path: build_output/*.apk
