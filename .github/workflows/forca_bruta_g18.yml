name: Forca_Bruta_G18
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Pegando arquivos
        uses: actions/checkout@v4

      - name: 2. Preparando Hangar
        run: |
          # Instalando bibliotecas de sistema que o Ren'Py precisa
          sudo apt-get update && sudo apt-get install -y unzip libglu1 libpulse0 libasound2
          echo "Hangar pronto."

      - name: 3. Instalando Motor e RAPT (Ajuste de Pastas)
        run: |
          # Baixando e instalando o SDK principal
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-sdk.tar.bz2
          tar xf renpy-8.2.1-sdk.tar.bz2
          mv renpy-8.2.1-sdk renpy_sdk
          
          # Baixando o RAPT (Ferramenta Android)
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-rapt.zip
          unzip -q renpy-8.2.1-rapt.zip
          
          # MOVENDO A PASTA CERTA (O unzip cria uma pasta chamada 'rapt')
          mv rapt renpy_sdk/rapt

      - name: 4. Cuspindo Código (O SHOW COMEÇA AGORA)
        run: |
          mkdir -p build_output
          chmod +x renpy_sdk/renpy.sh
          # Usando o comando que funcionou lá atrás para ler seus arquivos
          ./renpy_sdk/renpy.sh . distribute --destination build_output --platforms android

      - name: 5. Entrega da Carga
        uses: actions/upload-artifact@v4
        with:
          name: APK_Final_GamesMais18
          path: build_output/*.apk
